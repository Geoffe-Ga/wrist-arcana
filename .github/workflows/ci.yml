name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --strict

  format:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: swiftformat --lint .

  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Build watchOS app (no codesign)
        env:
          NSUnbufferedIO: "YES"
        run: |
          set -eo pipefail
          xcodebuild build \
            -project WristArcana/WristArcana.xcodeproj \
            -target "WristArcana Watch App" \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 10 (46mm)' \
            CODE_SIGNING_ALLOWED=NO

  # Guards against the iOS stub container target being removed again.
  # Watch-only apps must ship inside a watchapp2-container for App Store
  # distribution; removing it (cc65a6b, Nov 2025) silently broke uploads
  # until the next submission attempt. This archives the container scheme
  # unsigned and verifies the watch app is embedded — no export, no upload.
  archive-guard:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Archive container scheme (no codesign, no upload)
        env:
          NSUnbufferedIO: "YES"
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project WristArcana/WristArcana.xcodeproj \
            -scheme "WristArcana" \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/WristArcana-guard.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify watch app is embedded in container archive
        run: |
          test -d "/tmp/WristArcana-guard.xcarchive/Products/Applications/WristArcana.app/Watch/WristArcana Watch App.app"

  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Clean simulator state
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl erase all || true

      - name: Run unit tests
        env:
          NSUnbufferedIO: "YES"
          SIMULATOR: "Apple Watch Series 10 (46mm)"
        run: |
          set -eo pipefail
          ./scripts/run-tests.sh unit

      # UI Tests - Run sequentially with stabilization delays to reduce CI flakiness
      # Each suite runs independently with reduced parallelism

      - name: Stabilize simulator before UI tests
        run: |
          echo "Waiting for simulator to stabilize..."
          sleep 10
          xcrun simctl shutdown all || true
          sleep 5

      - name: Run UI tests - DrawCardViewResponsivenessUITests
        env:
          NSUnbufferedIO: "YES"
          SIMULATOR: "Apple Watch Series 10 (46mm)"
          CI_MODE: "true"
        run: |
          set -eo pipefail
          ./scripts/run-tests.sh DrawCardViewResponsivenessUITests

      - name: Stabilize simulator between suites (1/2)
        run: |
          echo "Cooling down between test suites..."
          sleep 15
          xcrun simctl shutdown all || true
          sleep 5

      - name: Run UI tests - WristArcanaWatchAppUITests (flaky in CI)
        continue-on-error: true
        env:
          NSUnbufferedIO: "YES"
          SIMULATOR: "Apple Watch Series 10 (46mm)"
          CI_MODE: "true"
        run: |
          set -eo pipefail
          ./scripts/run-tests.sh WristArcanaWatchAppUITests

      - name: Stabilize simulator between suites (2/2)
        run: |
          echo "Cooling down between test suites..."
          sleep 15
          xcrun simctl shutdown all || true
          sleep 5

      - name: Run UI tests - WristArcanaWatchAppUITestsLaunchTests
        env:
          NSUnbufferedIO: "YES"
          SIMULATOR: "Apple Watch Series 10 (46mm)"
          CI_MODE: "true"
        run: |
          set -eo pipefail
          ./scripts/run-tests.sh WristArcanaWatchAppUITestsLaunchTests
